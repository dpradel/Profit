<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Profit — Sine Depth (idea)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#03050d; font-family:system-ui,-apple-system,sans-serif; }
#showcase { width:100%; height:520px; position:relative; overflow:hidden; background:#03050d; }
.glow { position:absolute; bottom:-80px; left:50%; transform:translateX(-50%); width:780px; height:300px; border-radius:50%; background:radial-gradient(ellipse at 50% 70%, rgba(5,116,222,.28)0%, rgba(0,168,255,.09)40%, transparent 70%); filter:blur(65px); pointer-events:none; will-change:transform,opacity; }
.copy { position:absolute; left:50%; top:50%; transform:translateX(-50%) translateY(-54%); text-align:center; width:540px; z-index:30; will-change:transform,opacity; }
.c-eye { display:block;font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:14px; }
.c-h1 { font-size:42px;font-weight:800;letter-spacing:-.04em;line-height:1.05;color:#EEF3FF;margin-bottom:12px; }
.c-h1 strong { color:#4A9EFF; }
.c-sub { font-size:14px;line-height:1.68;color:rgba(238,243,255,.4);max-width:400px;margin:0 auto 22px; }
.c-ctas { display:flex;gap:10px;justify-content:center; }
.c-btn { display:inline-flex;align-items:center;padding:9px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none; }
.c-btn-p { background:rgba(5,116,222,.88);color:#fff;border:1px solid rgba(0,198,255,.2); }
.c-btn-s { background:rgba(255,255,255,.05);color:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.10); }
.iface { position:absolute; width:560px; height:354px; left:50%; top:50%; background:#060d1a; border:1px solid rgba(255,255,255,.08); border-radius:10px; overflow:hidden; will-change:transform; box-shadow:0 40px 90px rgba(0,0,0,.65); z-index:40; }
.scue { position:absolute;bottom:42px;left:50%;transform:translateX(-50%);z-index:200;color:rgba(255,255,255,.25);font-size:9px;display:flex;align-items:center;gap:6px;letter-spacing:.13em;text-transform:uppercase;pointer-events:none; }
.sa { animation:bob 1.8s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }
</style>
</head>
<body>
<div id="showcase">
  <canvas id="c2" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <div class="glow" id="g2"></div>
  <div class="copy" id="cp2">
    <span class="c-eye">Profit Pro · Trading</span>
    <h2 class="c-h1">Descubra o <strong>Profit</strong>.</h2>
    <p class="c-sub">A plataforma líder dos traders, acessível em qualquer lugar e a qualquer momento.</p>
    <div class="c-ctas"><a class="c-btn c-btn-p">Começar grátis</a><a class="c-btn c-btn-s">Conhecer recursos</a></div>
  </div>
  <div class="iface" id="if2"></div>
  <div class="scue"><span class="sa">↓</span> role para animar</div>
</div>
<script>
const cv2 = document.getElementById('c2'), ctx2 = cv2.getContext('2d');
const SINE_WAVES = [
  { amp:30, freq:0.0075, speed:0.22, yBase:0.28, alpha:0.20, col:'40,120,255' },
  { amp:16, freq:0.0130, speed:0.38, yBase:0.38, alpha:0.13, col:'40,120,255' },
  { amp:44, freq:0.0048, speed:0.14, yBase:0.50, alpha:0.08, col:'80,160,255' },
  { amp:12, freq:0.0190, speed:0.55, yBase:0.60, alpha:0.11, col:'20,80,200'  },
  { amp:58, freq:0.0038, speed:0.10, yBase:0.72, alpha:0.06, col:'40,100,220' },
  { amp:20, freq:0.0095, speed:0.30, yBase:0.84, alpha:0.15, col:'60,140,255' },
];
function drawSineDepth(p, t) {
  const dpr = window.devicePixelRatio || 1;
  const W = cv2.offsetWidth, H = cv2.offsetHeight;
  cv2.width = W * dpr; cv2.height = H * dpr;
  ctx2.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx2.clearRect(0, 0, W, H);
  SINE_WAVES.forEach((w, wi) => {
    const yOff = p * 40 * (wi + 1) * 0.18 * (wi % 2 === 0 ? 1 : -1);
    ctx2.beginPath();
    for (let x = 0; x <= W; x += 2) {
      const y = H * w.yBase + yOff + Math.sin(x * w.freq + t * w.speed) * w.amp;
      x === 0 ? ctx2.moveTo(x, y) : ctx2.lineTo(x, y);
    }
    ctx2.strokeStyle = `rgba(${w.col},${w.alpha})`;
    ctx2.lineWidth = w.amp > 35 ? 0.6 : 1;
    ctx2.stroke();
  });
  const vg = ctx2.createRadialGradient(W/2, H*0.38, 0, W/2, H*0.38, W*0.54);
  vg.addColorStop(0, 'rgba(3,5,13,0)');
  vg.addColorStop(1, 'rgba(3,5,13,0.88)');
  ctx2.fillStyle = vg; ctx2.fillRect(0, 0, W, H);
}
const lerp  = (a, b, t) => a + (b - a) * t;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const eOut  = t => 1 - (1 - t) ** 3;
let prog = 0, target = 0, clock = 0;
let mx = .5, my = .5, tiltX = 0, tiltY = 0;
const sc = document.getElementById('showcase');
sc.addEventListener('wheel', e => { e.preventDefault(); target = Math.max(0, Math.min(1, target + e.deltaY * 0.0016)); }, { passive: false });
sc.addEventListener('mousemove', ev => { const r = sc.getBoundingClientRect(); mx = (ev.clientX - r.left) / r.width; my = (ev.clientY - r.top) / r.height; });
sc.addEventListener('mouseleave', () => { mx = .5; my = .5; });
function loop() {
  clock += 0.016; prog = lerp(prog, target, 0.042);
  drawSineDepth(prog, clock);
  const g = document.getElementById('g2');
  g.style.opacity = String(0.45 + prog * 0.65);
  g.style.transform = `translateX(-50%) translateY(${-prog * 50}px) scale(${1 + prog * 0.4})`;
  const cp_ = clamp(prog / 0.65, 0, 1);
  const cp = document.getElementById('cp2');
  cp.style.transform = `translateX(-50%) translateY(calc(-54% - ${eOut(cp_) * 48}px))`;
  cp.style.opacity = String(Math.max(0, 1 - cp_ * 1.1));
  tiltX = lerp(tiltX, (my - .5) * 4.2, .05);
  tiltY = lerp(tiltY, (mx - .5) * -4.2, .05);
  const ifp = eOut(clamp((prog - 0.04) / 0.96, 0, 1));
  const ifTY = lerp(460, 28, ifp);
  const ip = document.getElementById('if2');
  ip.style.opacity = '1';
  ip.style.transform = `translateX(-50%) translateY(calc(-50% + ${ifTY}px)) perspective(1100px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
